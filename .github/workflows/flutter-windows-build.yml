name: Flutter Windows Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Ensure Windows desktop project
        shell: pwsh
        run: |
          if (-not (Test-Path "windows/CMakeLists.txt")) {
            flutter create --platforms=windows .
          } else {
            Write-Host "Windows desktop project already exists and is configured."
          }

      - name: Build Windows
        run: flutter build windows --release

      - name: Prepare Windows bundle
        shell: pwsh
        run: ./scripts/prepare_windows_bundle.ps1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows/x64/runner/Release/
          if-no-files-found: error
